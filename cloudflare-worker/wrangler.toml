# Cloudflare Worker Configuration for GitHub Webhook Gateway
name = "webhook-gateway"
main = "webhook-gateway.js"
compatibility_date = "2024-01-01"

# Environment variables for the worker
[env.development.vars]
TARGET_URL = "http://localhost:3001"

[env.production.vars]
TARGET_URL = "https://your-production-domain.com"

# Optional: Add webhook secret for additional validation
# WEBHOOK_SECRET = "your-webhook-secret"

# Worker settings
[build]
command = ""

# Routes configuration (update with your actual domain)
[[env.production.routes]]
pattern = "webhook-gateway.pixeliumperfecto.workers.dev/*"
zone_name = "pixeliumperfecto.workers.dev"

# Development configuration
[env.development]
name = "webhook-gateway-dev"

# Bindings for additional services (if needed)
# [[kv_namespaces]]
# binding = "WEBHOOK_LOGS"
# id = "your-kv-namespace-id"

# Cron triggers (if you want scheduled tasks)
# [[triggers.crons]]
# cron = "0 0 * * *"  # Daily at midnight

